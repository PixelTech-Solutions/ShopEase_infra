# =============================================================================
# ShopEase Infrastructure — Dev Environment
# =============================================================================
# State key:  shopease/shopease/dev/terraform.tfstate
# Var file:   environments/dev.tfvars
# =============================================================================

name: "Deploy ShopEase Infra - Dev"

on:
  push:
    branches: [main]
    paths: ["infra/**"]
  pull_request:
    branches: [main]
    paths: ["infra/**"]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  TF_VAR_jwt_secret: ${{ secrets.TF_VAR_jwt_secret }}
  TF_VAR_mongodb_uri_users: ${{ secrets.TF_VAR_mongodb_uri_users }}
  TF_VAR_mongodb_uri_products: ${{ secrets.TF_VAR_mongodb_uri_products }}
  TF_VAR_mongodb_uri_orders: ${{ secrets.TF_VAR_mongodb_uri_orders }}
  TF_VAR_mongodb_uri_notifications: ${{ secrets.TF_VAR_mongodb_uri_notifications }}

jobs:
  dev:
    uses: PixelTech-Solutions/Terraform/.github/workflows/terraform.yml@main
    with:
      working_directory: ./infra/shopease
      environment: dev
      project_name: shopease
      service_name: shopease
    secrets: inherit
